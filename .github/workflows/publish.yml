name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'vue/**'
      - 'react/**'
      - 'index.js'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip the version-bump commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write  # needed to push the version bump commit + tag

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bumps package.json patch version (1.3.11 → 1.3.12),
      # commits "chore: release v1.3.12 [skip ci]", and creates a git tag.
      # Use "minor" or "major" in the commit message to control bump size:
      #   git commit -m "feat: something [minor]"  → bumps minor
      #   git commit -m "feat: something [major]"  → bumps major
      - name: Bump version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            BUMP=major
          elif echo "$MSG" | grep -q '\[minor\]'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          npm version $BUMP -m "chore: release v%s [skip ci]"

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
