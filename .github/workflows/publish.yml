name: Publish to npm

# Triggers only when a version tag is pushed (e.g. v1.4.3)
on:
  push:
    tags:
      - 'v*'

# Matches npm's documented example exactly
permissions:
  id-token: write  # Required for OIDC trusted publisher
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm publish
