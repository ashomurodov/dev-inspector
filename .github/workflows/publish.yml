name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'vue/**'
      - 'react/**'
      - 'index.js'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip the version-bump commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write   # push version bump commit + tag
      id-token: write   # OIDC — allows npm to verify this is GitHub Actions

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bumps package.json patch version (e.g. 1.3.13 → 1.3.14),
      # commits "chore: release v1.3.14 [skip ci]", and creates a git tag.
      # Control bump size via commit message:
      #   [minor] → bumps minor  (1.3.13 → 1.4.0)
      #   [major] → bumps major  (1.3.13 → 2.0.0)
      - name: Bump version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            BUMP=major
          elif echo "$MSG" | grep -q '\[minor\]'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          npm version $BUMP -m "chore: release v%s [skip ci]"

      - name: Push version commit and tag
        run: git push --follow-tags

      # --provenance attaches a signed build attestation (best practice with OIDC)
      # --access public required for scoped packages, safe to keep for unscoped too
      - name: Publish to npm
        run: npm publish --provenance --access public
