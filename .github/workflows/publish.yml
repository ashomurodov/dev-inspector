name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'vue/**'
      - 'react/**'
      - 'index.js'
      - 'package.json'

permissions:
  id-token: write  # Required for OIDC trusted publisher
  contents: write  # Required to push the version bump commit

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip the version-bump commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # [minor] or [major] in commit message controls the bump, otherwise patch
      - name: Bump version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then BUMP=major
          elif echo "$MSG" | grep -q '\[minor\]'; then BUMP=minor
          else BUMP=patch
          fi
          npm version $BUMP -m "chore: release v%s [skip ci]"

      - name: Publish to npm
        run: npm publish

      - name: Push version commit
        run: git push --follow-tags
