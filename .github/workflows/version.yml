name: Bump version

# Triggers on push to main (when actual source files change)
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'vue/**'
      - 'react/**'
      - 'index.js'
      - 'package.json'

permissions:
  contents: write  # needed to push the version commit + tag

jobs:
  bump:
    runs-on: ubuntu-latest

    # Skip if this is already a version bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Commit message controls bump size:
      #   [minor] → 1.4.2 → 1.5.0
      #   [major] → 1.4.2 → 2.0.0
      #   (anything else) → 1.4.2 → 1.4.3
      - name: Bump version and push tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            BUMP=major
          elif echo "$MSG" | grep -q '\[minor\]'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          npm version $BUMP -m "chore: release v%s [skip ci]"
          git push --follow-tags
